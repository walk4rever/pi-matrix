<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background dot grid (3x3 matrix) -->
  <circle cx="14" cy="14" r="2.2" fill="#87867f" opacity="0.3"/>
  <circle cx="32" cy="14" r="2.2" fill="#87867f" opacity="0.3"/>
  <circle cx="50" cy="14" r="2.2" fill="#87867f" opacity="0.3"/>
  <circle cx="14" cy="32" r="2.2" fill="#87867f" opacity="0.3"/>
  <circle cx="50" cy="32" r="2.2" fill="#87867f" opacity="0.3"/>
  <circle cx="14" cy="50" r="2.2" fill="#87867f" opacity="0.3"/>
  <circle cx="32" cy="50" r="2.2" fill="#87867f" opacity="0.3"/>
  <circle cx="50" cy="50" r="2.2" fill="#87867f" opacity="0.3"/>
  <!-- Center dot — terracotta accent -->
  <circle cx="32" cy="32" r="2.2" fill="#c96442" opacity="0.45"/>

  <!-- Left matrix bracket [ -->
  <path d="M10 10 L10 54 M10 10 L16 10 M10 54 L16 54"
        stroke="#4d4c48" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right matrix bracket ] -->
  <path d="M54 10 L54 54 M54 10 L48 10 M54 54 L48 54"
        stroke="#4d4c48" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- π symbol — terracotta, centered between brackets -->
  <!-- Horizontal bar -->
  <rect x="20" y="20" width="24" height="4.5" rx="2.25" fill="#c96442"/>
  <!-- Left leg: slight outward curve at bottom -->
  <path d="M25.5 24.5 Q25 38 23 50" stroke="#c96442" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Right leg: straight down -->
  <line x1="38.5" y1="24.5" x2="38.5" y2="50" stroke="#c96442" stroke-width="4" stroke-linecap="round"/>
</svg>
