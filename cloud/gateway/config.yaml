model_list:
  - model_name: default
    litellm_params:
      model: openai/os.environ/AI_PRIMARY_MODEL
      api_base: os.environ/AI_API_BASE_URL
      api_key: os.environ/AI_API_KEY

  - model_name: vision
    litellm_params:
      model: openai/os.environ/AI_VISION_MODEL
      api_base: os.environ/AI_API_BASE_URL
      api_key: os.environ/AI_API_KEY

general_settings:
  master_key: os.environ/GATEWAY_MASTER_KEY

litellm_settings:
  drop_params: true
