services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: pimatrix
      POSTGRES_USER: pimatrix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../cloud/supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pimatrix"]
      interval: 10s
      timeout: 5s
      retries: 5

  router:
    build:
      context: ../cloud/router
    restart: always
    env_file: .env
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN}
      FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  api:
    build:
      context: ../cloud/api
    restart: always
    env_file: .env
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  orchestrator:
    build:
      context: ../cloud/orchestrator
    restart: always
    env_file: .env
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      ROUTER_REPLY_URL: ${ROUTER_REPLY_URL}
      HERMES_MODEL: ${HERMES_MODEL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DOCKER_IMAGE: pi-matrix/hermes-agent:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # access host docker
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - router
      - api

volumes:
  postgres_data:

networks:
  default:
    name: pi-matrix
