name: pi-matrix

services:

  # LiteLLM Proxy — LLM Gateway
  gateway:
    container_name: pi-matrix-llm
    build:
      context: ../cloud/gateway
    restart: always
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      retries: 3

  # Message — central Feishu adapter + session router
  # Holds Feishu credentials; routes execution to per-user stateless executors.
  message:
    container_name: pi-matrix-message
    build:
      context: ../cloud/message
    restart: always
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      retries: 3

  api:
    container_name: pi-matrix-api
    build:
      context: ../cloud/api
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:8080:8000"    # exposed to host nginx only
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      retries: 3

  orchestrator:
    container_name: pi-matrix-orchestrator
    build:
      context: ../cloud/orchestrator
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:8081:8000"    # exposed to host nginx only
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

networks:
  default:
    name: pi-matrix
