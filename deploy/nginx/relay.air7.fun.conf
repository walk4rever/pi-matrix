server {
    listen 443 ssl;
    server_name relay.air7.fun;

    # SSL 证书路径按你服务器实际路径填写
    ssl_certificate     /etc/nginx/certs/relay.air7.fun/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/relay.air7.fun/privkey.pem;

    # API — 供 dashboard 和设备调用
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Orchestrator webhook — 仅 Supabase 触发，不对外公开
    location /internal/orchestrator/ {
        allow 127.0.0.1;
        deny  all;
        proxy_pass http://127.0.0.1:8081/;
    }
}

server {
    listen 80;
    server_name relay.air7.fun;
    return 301 https://$host$request_uri;
}
