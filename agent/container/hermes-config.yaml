toolsets:
  - file
  - terminal
  - skills
  - memory
  - session_search
  - clarify
  - code_execution
  - delegation
  - todo
  - tts
  - vision
  - browser
  - feishu_doc
  - feishu_drive

agent:
  max_turns: 90
  gateway_timeout: 1800

terminal:
  backend: local
  cwd: /root/.hermes/workspace
  timeout: 180

approvals:
  mode: manual

memory:
  memory_enabled: true
  user_profile_enabled: true

compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20

display:
  compact: false
  personality: kawaii
  streaming: false

logging:
  level: INFO
