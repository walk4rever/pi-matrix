toolsets:
  - hermes-feishu

agent:
  max_turns: 90
  gateway_timeout: 1800

approvals:
  mode: manual

memory:
  memory_enabled: true
  user_profile_enabled: true

compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20

display:
  compact: false
  personality: kawaii
  streaming: false

logging:
  level: INFO
